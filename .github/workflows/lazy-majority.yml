name: lazy-majority-check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed]

permissions:
  contents: read
  pull-requests: read

jobs:
  lazy-majority-check:
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate lazy-majority conditions
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            const { owner, repo } = context.repo;

            if (!pr) {
              core.notice('No pull request found in event payload; nothing to evaluate.');
              return;
            }

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number: pr.number, per_page: 100 }
            );
            const touchesProposals = files.some(f =>
              f.filename.startsWith('proposals/')
            );

            if (!touchesProposals) {
              core.notice('Not a proposal PR — skipping lazy-majority rule.');
              return;
            }

            const reviews = await github.paginate(
              github.rest.pulls.listReviews,
              { owner, repo, pull_number: pr.number, per_page: 100 }
            );
            const latestByReviewer = new Map();
            for (const r of reviews) {
              if (!r.user) continue;
              if (!['APPROVED', 'CHANGES_REQUESTED', 'DISMISSED'].includes(r.state)) continue;
              latestByReviewer.set(r.user.login, r.state);
            }

            const approvals = [...latestByReviewer.values()]
              .filter(state => state === 'APPROVED').length;
            const blocks = [...latestByReviewer.entries()]
              .filter(([, state]) => state === 'CHANGES_REQUESTED');

            const ageMs = Date.now() - new Date(pr.created_at).getTime();
            const ageDays = ageMs / (1000 * 60 * 60 * 24);

            const needed = 3;
            const windowDays = 7;
            const remainingApprovals = Math.max(0, needed - approvals);
            const remainingDays = Math.max(0, windowDays - ageDays);

            let message = `OK: ${approvals} approvals, 0 blocks, ${ageDays.toFixed(1)}d open.`;

            if (blocks.length > 0) {
              const names = blocks.map(([user]) => '@' + user).join(', ');
              message = `Blocked by ${names}. Resolve before merge.`;
              core.setFailed(message);
              return;
            }

            if (remainingApprovals > 0) {
              message = `Needs ${remainingApprovals} more approval(s) (have ${approvals}/3).`;
              core.setFailed(message);
              return;
            }

            if (remainingDays > 0) {
              message = `7-day window: ${remainingDays.toFixed(1)} day(s) remaining.`;
              core.setFailed(message);
              return;
            }

            core.notice(message);
